name: Run Job Scraper

on:
  workflow_dispatch: # Allows you to run this manually or via API dispatch

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit scraped_jobs.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Stable version for Playwright
          cache: 'pip' # Cache pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add scraped_jobs.json
          # Only commit and push if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scraped_jobs.json via GitHub Actions" && git push)
